name: image-registry-cicd

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "config/**"
      - "discovery/**"
      - "apigateway/**"
      - ".github/workflows/image-registry-cicd.yml"

concurrency:
  group: image-registry-cicd
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: "${{ matrix.module_name }} 이미지 빌드 및 푸시"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module_name: config
            module_dir: config
            image_name: config
          - module_name: discovery
            module_dir: discovery
            image_name: discovery
          - module_name: apigateway
            module_dir: apigateway
            image_name: apigateway

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 이미지 경로 값 준비
        shell: bash
        run: |
          echo "IMAGE_REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "${GITHUB_ENV}"

      - name: QEMU 설정
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image URI
        id: prepare-image
        shell: bash
        run: |
          IMAGE_PATH="${IMAGE_REGISTRY}/${{ matrix.image_name }}"
          echo "image=${IMAGE_PATH}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_PATH}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.module_dir }}
          file: ${{ matrix.module_dir }}/Dockerfile
          push: true
          tags: |
            ${{ steps.prepare-image.outputs.image }}
            ${{ steps.prepare-image.outputs.latest }}
          platforms: linux/arm64

      - name: 결과 출력
        shell: bash
        run: |
          echo "완료 이미지: ${{ steps.prepare-image.outputs.image }}"
          echo "완료 이미지: ${{ steps.prepare-image.outputs.latest }}"