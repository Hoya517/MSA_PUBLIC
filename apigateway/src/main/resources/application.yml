server:
  port: 8000

token:
  expiration_time: 7200000
  refresh_time: 86400000
  secret: 'token_secret'
  public: 

spring:
  application:
    name: apigateway
  cloud:
    gateway:
      routes:
        #        - id: user-service
        #          uri: lb://USER-SERVICE
        #          predicates:
        #            - Path=/user-service/**
        #          filters:
        #            - RemoveRequestHeader=Cookie
